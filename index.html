<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Оновлення | let's cut</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-family: 'Segoe UI', sans-serif;
            --bg-color: #ffffff;
            --input-border: #e7e7e7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #000;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .maintenance-box {
            background: #ffffff;
            border-radius: 15px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--input-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        .logo { height: 60px; margin-bottom: 30px; object-fit: contain; }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 25px;
        }

        .dot {
            width: 10px;
            aspect-ratio: 1;
            background: #000;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 15px 0;
            line-height: 1.3;
        }

        p {
            font-family: 'Segoe UI', sans-serif;
            color: #5e5e5e;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* --- ОДНАКОВІ КНОПКИ --- */
        .social-footer {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-decoration: none;
            height: 52px;
            border-radius: 15px;
            font-size: 14px;
            flex: 1;
            background: #000;
            color: #fff;
            border: 2px solid #000;
            transition: 0.3s;
        }

        .btn-social:hover {
            background: transparent;
            color: #000;
        }

        @media (max-width: 480px) {
            .maintenance-box { padding: 30px 20px; }
            h1 { font-size: 20px; }
            .btn-social { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="maintenance-box">
        <img src="img/logo.png" alt="let's cut" class="logo" onerror="this.style.display='none'">
        
        <div class="loader-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <h1>Упс... На сайті відбувається оновлення</h1>
        
        <p>
            Я працюю над оновленням <b>v1.0.1</b>.<br>
            Зовсім скоро все запрацює ще краще. Дякую за терпіння!
        </p>

        <div class="social-footer">
            <a href="https://www.facebook.com/share/g/1GS7Z43H3F/" target="_blank" class="btn-social">Facebook</a>
            <a href="https://t.me/letscut_ua" target="_blank" class="btn-social">Telegram</a>
        </div>
    </div>

</body>
</html>
